<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video của tôi</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,Helvetica,sans-serif;
    background:#0f172a;
    color:#fff;
}

header{
    background:#111827;
    padding:20px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
    box-shadow:0 2px 10px rgba(0,0,0,.4);
}

.container{
    max-width:1000px;
    margin:40px auto;
    padding:20px;
}

.video{
    position:relative;
    width:100%;
    padding-top:56.25%;
    overflow:hidden;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,.5);
}

.video iframe{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    border:none;
}

.info{
    margin-top:25px;
}

.info h2{
    margin-bottom:10px;
}

.info p{
    color:#cbd5e1;
    line-height:1.7;
}

button{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:#fff;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

footer{
    text-align:center;
    color:#94a3b8;
    margin:40px 0;
}
</style>
</head>

<body>

<header>
🎬 Website Video
</header>

<div class="container">

<div class="video">
<iframe
src="https://abyssplayer.com/KQleO-wqK"
allowfullscreen
scrolling="no"
frameborder="0">
</iframe>
</div>

<div class="info">
<h2>Video của tôi</h2>

<p>
Chào mừng bạn đến với website xem video.
Video được phát trực tiếp từ Abyss Player.
</p>

<button onclick="location.reload()">
🔄 Tải lại Video
</button>

</div>

</div>

<footer>
© 2026 - My Video Website
</footer>

</body>
</html>
