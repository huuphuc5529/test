<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video của tôi</title>

    <style>
        body{
            margin:0;
            background:#111;
            color:#fff;
            font-family:Arial,sans-serif;
        }

        .container{
            max-width:1000px;
            margin:40px auto;
            padding:20px;
        }

        .video{
            position:relative;
            padding-top:56.25%;

        .video iframe{
            position:absolute;
            inset:0;
            width:100%;
            height:100%;
            border:0;
            border-radius:12px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎬 Video của tôi</h1>

    <div class="video">
        <iframe
            src="https://abyssplayer.com/KQleO-wqK"
            allowfullscreen
            scrolling="no">
        </iframe>
    </div>
</div>

<script src="https://iamcdn.net/players/replace-domain.js"></script>

</body>
</html>
